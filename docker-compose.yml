services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_support_db
    environment:
      POSTGRES_DB: ai_support_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: ai_support_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: ai_support_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata: